<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Yordamchi — AptekFinder</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet" />
    <style>
      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --surface2: #1c2128;
        --border: #30363d;
        --text: #e6edf3;
        --muted: #8b949e;
        --accent: #3fb950;
        --accent2: #58a6ff;
        --font-display: "DM Serif Display", serif;
        --font-body: "DM Sans", sans-serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-body);
        background: var(--bg);
        color: var(--text);
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── HEADER ─────────────────────────────── */
      header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 20px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .back-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        background: none;
        border: 1px solid var(--border);
        color: var(--muted);
        border-radius: 8px;
        padding: 7px 14px;
        font-size: 0.82rem;
        font-family: var(--font-body);
        cursor: pointer;
        text-decoration: none;
        transition:
          border-color 0.2s,
          color 0.2s;
      }
      .back-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .header-title {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .ai-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(135deg, #3fb950, #58a6ff);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
      }
      .header-title h1 {
        font-family: var(--font-display);
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.1;
      }
      .header-title p {
        font-size: 0.72rem;
        color: var(--accent);
        margin-top: 1px;
      }
      .model-badge {
        margin-left: auto;
        font-size: 0.7rem;
        color: var(--muted);
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 4px 10px;
        white-space: nowrap;
      }
      #clearBtn {
        background: none;
        border: 1px solid var(--border);
        color: var(--muted);
        border-radius: 8px;
        padding: 7px 12px;
        font-size: 0.75rem;
        font-family: var(--font-body);
        cursor: pointer;
        transition:
          border-color 0.2s,
          color 0.2s;
      }
      #clearBtn:hover {
        border-color: #f85149;
        color: #f85149;
      }

      /* ── MESSAGES ───────────────────────────── */
      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        scroll-behavior: smooth;
      }
      #messages::-webkit-scrollbar {
        width: 4px;
      }
      #messages::-webkit-scrollbar-track {
        background: transparent;
      }
      #messages::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
      }

      /* Welcome */
      .welcome {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex: 1;
        text-align: center;
        gap: 16px;
        padding: 40px 20px;
        min-height: 300px;
      }
      .welcome-icon {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          rgba(63, 185, 80, 0.15),
          rgba(88, 166, 255, 0.15)
        );
        border: 1px solid rgba(63, 185, 80, 0.25);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
      }
      .welcome h2 {
        font-family: var(--font-display);
        font-size: 1.4rem;
        font-weight: 400;
      }
      .welcome p {
        font-size: 0.85rem;
        color: var(--muted);
        max-width: 320px;
        line-height: 1.6;
      }
      .suggestions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        margin-top: 8px;
      }
      .suggestion-chip {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 8px 16px;
        font-size: 0.78rem;
        color: var(--muted);
        cursor: pointer;
        font-family: var(--font-body);
        transition:
          border-color 0.2s,
          color 0.2s;
      }
      .suggestion-chip:hover {
        border-color: var(--accent);
        color: var(--text);
      }

      /* Bubbles */
      .msg {
        display: flex;
        gap: 10px;
        animation: fadeUp 0.25s ease;
        max-width: 820px;
        width: 100%;
        margin: 0 auto;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .msg.user {
        flex-direction: row-reverse;
      }
      .msg-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        margin-top: 4px;
      }
      .msg.user .msg-avatar {
        background: var(--surface2);
        border: 1px solid var(--border);
      }
      .msg.ai .msg-avatar {
        background: linear-gradient(135deg, #3fb950, #58a6ff);
      }
      .bubble {
        max-width: calc(100% - 44px);
        padding: 12px 16px;
        border-radius: 16px;
        font-size: 0.88rem;
        line-height: 1.65;
      }
      .msg.user .bubble {
        background: var(--accent2);
        color: #0d1117;
        border-radius: 16px 4px 16px 16px;
      }
      .msg.ai .bubble {
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 4px 16px 16px 16px;
      }
      .bubble p {
        margin-bottom: 8px;
      }
      .bubble p:last-child {
        margin-bottom: 0;
      }
      .bubble ul,
      .bubble ol {
        padding-left: 18px;
        margin: 6px 0;
      }
      .bubble li {
        margin-bottom: 4px;
      }
      .bubble strong {
        color: var(--accent);
        font-weight: 600;
      }
      .bubble code {
        background: rgba(255, 255, 255, 0.07);
        border-radius: 4px;
        padding: 1px 5px;
        font-family: "Courier New", monospace;
        font-size: 0.83em;
      }

      /* Typing */
      .typing-dots {
        display: flex;
        gap: 4px;
        padding: 4px 0;
        align-items: center;
      }
      .typing-dots span {
        width: 7px;
        height: 7px;
        background: var(--muted);
        border-radius: 50%;
        animation: bounce 1.2s infinite;
      }
      .typing-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes bounce {
        0%,
        60%,
        100% {
          transform: translateY(0);
        }
        30% {
          transform: translateY(-6px);
        }
      }

      /* ── INPUT ──────────────────────────────── */
      .input-area {
        padding: 14px 20px 18px;
        background: var(--surface);
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }
      .input-row {
        display: flex;
        gap: 10px;
        align-items: flex-end;
        max-width: 820px;
        margin: 0 auto;
      }
      #userInput {
        flex: 1;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 16px;
        color: var(--text);
        font-family: var(--font-body);
        font-size: 0.88rem;
        outline: none;
        resize: none;
        min-height: 48px;
        max-height: 160px;
        line-height: 1.5;
        transition: border-color 0.2s;
      }
      #userInput:focus {
        border-color: var(--accent2);
      }
      #userInput::placeholder {
        color: var(--muted);
      }
      #sendBtn {
        width: 48px;
        height: 48px;
        border: none;
        border-radius: 50%;
        background: linear-gradient(135deg, #3fb950, #58a6ff);
        color: #0d1117;
        font-size: 20px;
        cursor: pointer;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          transform 0.15s,
          opacity 0.15s;
      }
      #sendBtn:hover {
        transform: scale(1.07);
      }
      #sendBtn:active {
        transform: scale(0.95);
      }
      #sendBtn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }
      .input-hint {
        text-align: center;
        font-size: 0.7rem;
        color: var(--muted);
        margin-top: 8px;
        max-width: 820px;
        margin-left: auto;
        margin-right: auto;
      }

      /* ── TOAST ──────────────────────────────── */
      #toast {
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: rgba(248, 81, 73, 0.15);
        border: 1px solid rgba(248, 81, 73, 0.4);
        color: #f85149;
        padding: 10px 20px;
        border-radius: 10px;
        font-size: 0.82rem;
        opacity: 0;
        transition:
          opacity 0.3s,
          transform 0.3s;
        pointer-events: none;
        z-index: 9999;
        white-space: nowrap;
      }
      #toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    </style>
  </head>
  <body>
    <!-- HEADER -->
    <header>
      <a href="index.html" class="back-btn">← Xaritaga</a>
      <div class="header-title">
        <div class="ai-avatar">🤖</div>
        <div>
          <h1>AI Yordamchi</h1>
          <p>● Faol</p>
        </div>
      </div>
      <span class="model-badge">gemini-2.0-flash</span>
      <button id="clearBtn" title="Suhbatni tozalash">🗑 Tozalash</button>
    </header>

    <!-- MESSAGES -->
    <div id="messages">
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-icon">💊</div>
        <h2>AptekFinder AI Yordamchi</h2>
        <p>
          Dori-darmonlar, ularning ta'siri, dozalash yoki yaqin dorixonalar
          haqida savol bering.
        </p>
        <div class="suggestions">
          <button
            class="suggestion-chip"
            onclick="
              useSuggestion('Paracetamol qanday dori va qachon ishlatiladi?')
            ">
            💊 Paracetamol nima?
          </button>
          <button
            class="suggestion-chip"
            onclick="
              useSuggestion('Toshkentda 24 soatlik dorixonalar qayerda?')
            ">
            🗺 24/7 dorixonalar
          </button>
          <button
            class="suggestion-chip"
            onclick="useSuggestion('Gripp uchun qaysi dorilar kerak?')">
            🤧 Gripp dorisi
          </button>
          <button
            class="suggestion-chip"
            onclick="
              useSuggestion('Vitamin D dozasini qanday hisoblash kerak?')
            ">
            ☀️ Vitamin D
          </button>
        </div>
      </div>
    </div>

    <!-- INPUT -->
    <div class="input-area">
      <div class="input-row">
        <textarea
          id="userInput"
          placeholder="Savol yozing… (Shift+Enter — yangi qator)"
          rows="1"></textarea>
        <button id="sendBtn" title="Yuborish">➤</button>
      </div>
      <p class="input-hint">
        AI xato qilishi mumkin. Muhim tibbiy savollarda shifokorga murojaat
        qiling.
      </p>
    </div>

    <div id="toast"></div>

    <script>
      // ── CONFIG ──────────────────────────────────────────────────
      const MAX_HISTORY = 10;
      const API_ENDPOINT = "/api/ai/chat"; // ← o'z serverimizga yuboriladi

      // ── STATE ───────────────────────────────────────────────────
      let conversationHistory = [];
      let isLoading = false;

      const messagesEl = document.getElementById("messages");
      const userInputEl = document.getElementById("userInput");
      const sendBtn = document.getElementById("sendBtn");

      // ── TOAST ───────────────────────────────────────────────────
      let toastTimer;
      function showToast(msg, type = "error") {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.style.background =
          type === "success" ? "rgba(63,185,80,.15)" : "rgba(248,81,73,.15)";
        el.style.borderColor =
          type === "success" ? "rgba(63,185,80,.4)" : "rgba(248,81,73,.4)";
        el.style.color = type === "success" ? "#3fb950" : "#f85149";
        el.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove("show"), 3500);
      }

      // ── TEXTAREA ────────────────────────────────────────────────
      userInputEl.addEventListener("input", () => {
        userInputEl.style.height = "auto";
        userInputEl.style.height =
          Math.min(userInputEl.scrollHeight, 160) + "px";
      });
      userInputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      });
      sendBtn.addEventListener("click", handleSend);

      // ── SUGGESTIONS ─────────────────────────────────────────────
      function useSuggestion(text) {
        userInputEl.value = text;
        userInputEl.dispatchEvent(new Event("input"));
        handleSend();
      }
      window.useSuggestion = useSuggestion;

      // ── RENDER ──────────────────────────────────────────────────
      function removeWelcome() {
        const w = document.getElementById("welcomeScreen");
        if (w) w.remove();
      }

      function appendMessage(role, text) {
        removeWelcome();
        const isUser = role === "user";
        const div = document.createElement("div");
        div.className = `msg ${isUser ? "user" : "ai"}`;
        div.innerHTML = `
          <div class="msg-avatar">${isUser ? "👤" : "🤖"}</div>
          <div class="bubble">${formatText(text)}</div>`;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function appendTyping() {
        removeWelcome();
        const div = document.createElement("div");
        div.className = "msg ai";
        div.id = "typingMsg";
        div.innerHTML = `
          <div class="msg-avatar">🤖</div>
          <div class="bubble">
            <div class="typing-dots"><span></span><span></span><span></span></div>
          </div>`;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return div;
      }

      function formatText(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
          .replace(/`([^`]+)`/g, "<code>$1</code>")
          .replace(/\n\n/g, "</p><p>")
          .replace(/\n/g, "<br>")
          .replace(/^/, "<p>")
          .replace(/$/, "</p>");
      }

      // ── FETCH WITH RETRY ────────────────────────────────────────
      async function fetchWithRetry(url, options, retries = 2) {
        for (let i = 0; i <= retries; i++) {
          const response = await fetch(url, options);
          if (response.status === 429 && i < retries) {
            const waitMs = (i + 1) * 3000;
            showToast(`Limit oshdi. ${waitMs / 1000}s kutilmoqda...`);
            await new Promise((r) => setTimeout(r, waitMs));
            continue;
          }
          return response;
        }
      }

      // ── SEND ────────────────────────────────────────────────────
      async function handleSend() {
        const text = userInputEl.value.trim();
        if (!text || isLoading) return;

        isLoading = true;
        sendBtn.disabled = true;
        userInputEl.value = "";
        userInputEl.style.height = "auto";

        appendMessage("user", text);
        conversationHistory.push({ role: "user", content: text });

        const typingEl = appendTyping();

        try {
          // Oxirgi MAX_HISTORY xabar (429 oldini olish)
          const trimmedHistory = conversationHistory.slice(-MAX_HISTORY);

          const contents = trimmedHistory.map((m) => ({
            role: m.role === "user" ? "user" : "model",
            parts: [{ text: m.content }],
          }));

          // O'z serverimizga yuboramiz (API key server tomonda)
          const response = await fetchWithRetry(API_ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents }),
          });

          typingEl.remove();

          if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            const msg = err?.error || `Server xatosi: ${response.status}`;
            if (response.status === 429) {
              showToast("Limit oshdi. Bir necha daqiqa kuting.");
            } else {
              showToast(msg);
            }
            isLoading = false;
            sendBtn.disabled = false;
            return;
          }

          const data = await response.json();
          const aiText =
            data.candidates?.[0]?.content?.parts?.[0]?.text ||
            "Javob olishda xatolik.";

          conversationHistory.push({ role: "assistant", content: aiText });
          appendMessage("ai", aiText);
        } catch (e) {
          typingEl.remove();
          showToast("Tarmoq xatosi. Internetni tekshiring.");
        }

        isLoading = false;
        sendBtn.disabled = false;
        userInputEl.focus();
      }

      // ── CLEAR ───────────────────────────────────────────────────
      document.getElementById("clearBtn").addEventListener("click", () => {
        conversationHistory = [];
        messagesEl.innerHTML = `
          <div class="welcome" id="welcomeScreen">
            <div class="welcome-icon">💊</div>
            <h2>AptekFinder AI Yordamchi</h2>
            <p>Dori-darmonlar, ularning ta'siri, dozalash yoki yaqin dorixonalar haqida savol bering.</p>
            <div class="suggestions">
              <button class="suggestion-chip" onclick="useSuggestion('Paracetamol qanday dori va qachon ishlatiladi?')">💊 Paracetamol nima?</button>
              <button class="suggestion-chip" onclick="useSuggestion('Toshkentda 24 soatlik dorixonalar qayerda?')">🗺 24/7 dorixonalar</button>
              <button class="suggestion-chip" onclick="useSuggestion('Gripp uchun qaysi dorilar kerak?')">🤧 Gripp dorisi</button>
              <button class="suggestion-chip" onclick="useSuggestion('Vitamin D dozasini qanday hisoblash kerak?')">☀️ Vitamin D</button>
            </div>
          </div>`;
      });

      // ── INIT ────────────────────────────────────────────────────
      userInputEl.focus();
    </script>
  </body>
</html>
